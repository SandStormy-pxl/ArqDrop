<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArqDrop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        twitterBlue: '#1d9bf0',
                        twitterHover: '#1a8cd8',
                        darkBg: '#0b0f19',
                        cardBg: '#151f32',
                        borderGray: '#24334d'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-darkBg text-slate-200 min-h-screen flex items-center justify-center font-sans antialiased p-4">

    <div class="w-full max-w-sm bg-cardBg p-6 lg:p-8 rounded-2xl border border-borderGray shadow-2xl mx-auto">
        <div class="text-center mb-6">
            <h2 class="text-xl font-bold text-white tracking-tight">Log in to <span class="text-twitterBlue">ArqDrop</span></h2>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 p-3 rounded-xl text-xs bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-center">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Username</label>
                    <input type="text" name="username" required
                           class="w-full bg-darkBg border border-borderGray rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-twitterBlue text-white transition">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-400 mb-1.5 uppercase tracking-wider">Password</label>
                    <input type="password" name="password" required
                           class="w-full bg-darkBg border border-borderGray rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-twitterBlue text-white transition">
                </div>
                <button type="submit" class="w-full bg-twitterBlue hover:bg-twitterHover text-white py-2.5 rounded-xl font-bold text-sm transition mt-2 shadow-lg shadow-twitterBlue/10">
                    Log In
                </button>
        </form>
        
        <div class="text-center mt-6 text-xs lg:text-sm text-slate-400">
            Don't have an account? <a href="{% url 'cadastro' %}" class="text-twitterBlue hover:underline">Sign up</a>
        </div>
    </div>

</body>
</html>
