<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termux</title>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: monospace; 
            margin: 20px; 
        }
        form { 
            margin-bottom: 20px; 
        }
        .prompt-container {
            display: flex;
            align-items: flex-start;
        }
        .prompt { 
            color: #0f0; 
            font-weight: bold; 
            margin-right: 5px; 
            white-space: nowrap;
        }
        input, textarea { 
            background: none; 
            color: #fff; 
            border: none; 
            outline: none; 
            font-family: monospace; 
            font-size: 1rem; 
            width: 85%; 
            padding: 0;
            margin: 0;
        }
        textarea { 
            height: 150px; 
            resize: none;
        }
        button { 
            display: none; 
        }
        pre { 
            color: #fff; 
            font-family: monospace; 
            white-space: pre-wrap; 
            margin-top: 20px; 
            border-top: 1px solid #222; 
            padding-top: 20px; 
        }
    </style>
</head>
<body>

    <form method="POST" id="terminal-form">
        {% csrf_token %}
        
        <input type="hidden" name="modo_atual" value="{{ modo }}">

        <div class="prompt-container">
            {% if modo == 'python' %}
                <span class="prompt">&gt;&gt;&gt;</span>
                <textarea name="comando" placeholder="código python" autofocus autocomplete="off"></textarea>
            {% else %}
                <span class="prompt">~$</span>
                <input type="text" name="comando" placeholder="comando bash" autofocus autocomplete="off">
            {% endif %}
        </div>
        <button type="submit"></button>
    </form>

    {% if resultado %}
        <pre>{{ resultado }}</pre>
    {% endif %}

    <script>
        const textarea = document.querySelector('textarea');
        if (textarea) {
            let ultimoEnter = 0;

            textarea.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    const agora = new Date().getTime();
                    const diferenca = agora - ultimoEnter;
                    
                    // Se o intervalo entre os dois Enters for menor que 500ms, envia o formulário
                    if (diferenca < 500) {
                        e.preventDefault();
                        this.form.submit();
                    }
                    
                    ultimoEnter = agora;
                }
            });
        }
    </script>
</body>
</html>
