<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console Python Interativo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Fira Code', monospace, sans-serif; padding: 20px; }
        .terminal-container { max-width: 900px; margin: 0 auto; background: #161b22; border: 1px solid #30363d; border-radius: 6px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .terminal-header { background: #21262d; padding: 10px 15px; border-bottom: 1px solid #30363d; display: flex; align-items: center; }
        .buttons { display: flex; gap: 8px; margin-right: 15px; }
        .btn-dot { width: 12px; height: 12px; border-radius: 50%; }
        .btn-r { background: #ff5f56; } .btn-y { background: #ffbd2e; } .btn-g { background: #27c93f; }
        .terminal-title { font-size: 13px; color: #8b949e; }
        .terminal-body { padding: 15px; }
        textarea { width: 100%; height: 180px; background: #0d1117; color: #58a6ff; border: 1px solid #30363d; border-radius: 6px; padding: 12px; font-family: inherit; font-size: 14px; resize: vertical; outline: none; }
        textarea:focus { border-color: #58a6ff; }
        .controls { display: flex; justify-content: flex-end; margin-top: 10px; }
        button { background: #238636; color: #ffffff; border: 1px solid rgba(240,246,252,0.1); border-radius: 6px; padding: 8px 16px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #2ea043; }
        .console-output { margin-top: 20px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 15px; min-height: 120px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
        .status-erro { color: #f85149; }
        .status-sucesso { color: #56d364; }
    </style>
</head>
<body>

    <div class="terminal-container">
        <div class="terminal-header">
            <div class="buttons">
                <div class="btn-dot btn-r"></div>
                <div class="btn-dot btn-y"></div>
                <div class="btn-dot btn-g"></div>
            </div>
            <div class="terminal-title">bash — arq-drop.vercel.app</div>
        </div>
        <div class="terminal-body">
            <textarea id="codigo-python" placeholder="# Digite seu código Python aqui&#10;# Digite exit() para limpar o console e reiniciar"></textarea>
            <div class="controls">
                <button onclick="processarEEnviarCodigo()">Executar Comando</button>
            </div>
            <div id="console-log" class="console-output"># Aguardando comandos...</div>
        </div>
    </div>

    <script>
        async function processarEEnviarCodigo() {
            const campoCodigo = document.getElementById('codigo-python').value.trim();
            const consoleLog = document.getElementById('console-log');
            
            if (!campoCodigo) return;

            // Se o comando for exit(), limpa a tela localmente sem submeter ao servidor
            if (campoCodigo === 'exit()' || campoCodigo === 'exit') {
                document.getElementById('codigo-python').value = '';
                consoleLog.className = "console-output";
                consoleLog.innerText = "# Console reiniciado.";
                return;
            }

            consoleLog.className = "console-output";
            consoleLog.innerText = "Executando no servidor...";

            const linhas = campoCodigo.split('\n');
            const listaRespostas = [];
            const regexInput = /input\s*\((.*?)\)/;

            for (let i = 0; i < linhas.length; i++) {
                if (regexInput.test(linhas[i])) {
                    const match = linhas[i].match(regexInput);
                    const promptTexto = match[1] ? match[1].replace(/['"]/g, '') : "Entrada requisitada:";
                    const respostaUsuario = prompt(promptTexto);
                    listaRespostas.push(respostaUsuario || "");
                }
            }

            try {
                const response = await fetch('/executar-codigo/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        codigo: campoCodigo,
                        respostas: listaRespostas
                    })
                });

                const dados = await response.json();

                if (dados.erro) {
                    consoleLog.className = "console-output status-erro";
                    consoleLog.innerText = `[Erro do Sistema]:\n${dados.erro}`;
                } else {
                    consoleLog.className = "console-output status-sucesso";
                    consoleLog.innerText = dados.saida || "Comando executado sem retorno de texto.";
                }

            } catch (erroRede) {
                consoleLog.className = "console-output status-erro";
                consoleLog.innerText = `Erro de comunicação: ${erroRede}`;
            }
        }
    </script>
</body>
</html>
