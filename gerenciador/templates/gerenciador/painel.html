<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termux</title>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: monospace; 
            margin: 20px; 
        }
        form { 
            margin-bottom: 20px; 
        }
        .prompt { 
            color: #0f0; 
            font-weight: bold; 
            margin-right: 5px; 
        }
        input { 
            background: none; 
            color: #fff; 
            border: none; 
            outline: none; 
            font-family: monospace; 
            font-size: 1rem; 
            width: 85%; 
        }
        button { 
            display: none; 
        }
        pre { 
            color: #fff; 
            font-family: monospace; 
            white-space: pre-wrap; 
            margin-top: 20px; 
            border-top: 1px solid #222; 
            padding-top: 20px; 
        }
    </style>
</head>
<body>

    <form method="POST">
        {% csrf_token %}
        
        {% if modo == 'python' %}
            <span class="prompt">&gt;&gt;&gt;</span>
            <input type="text" name="comando" placeholder="código python" autofocus autocomplete="off">
        {% else %}
            <span class="prompt">~$</span>
            <input type="text" name="comando" placeholder="comando bash" autofocus autocomplete="off">
        {% endif %}
        
        <button type="submit"></button>
    </form>

    {% if resultado %}
        <pre>{{ resultado }}</pre>
    {% endif %}

</body>
</html>
