<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termux - Gerenciador</title>
    <style>
        /* Estilo Base do Termux */
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 20px; 
            padding: 10px;
        }
        .termux-container { 
            max-width: 900px; 
            margin: 0 auto; 
        }
        .welcome-text { 
            color: #ffffff; 
            margin-bottom: 25px; 
            line-height: 1.4;
        }
        h3 { 
            color: #4af626; 
            margin-bottom: 5px; 
            font-size: 1.1rem;
        }
        
        /* Inputs e Caixa de Texto Estilo Prompt */
        .prompt-line {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .prompt-symbol {
            color: #4af626;
            font-weight: bold;
            margin-right: 10px;
            white-space: nowrap;
        }
        input[type="text"], textarea { 
            background-color: #000000; 
            color: #ffffff; 
            border: none; 
            outline: none; 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 1rem; 
            width: 100%;
        }
        textarea {
            resize: vertical;
            border-left: 2px solid #222;
            padding-left: 10px;
        }
        
        /* Botões Discretos estilo Terminal */
        button { 
            background-color: #111; 
            color: #4af626; 
            border: 1px solid #4af626; 
            padding: 5px 15px; 
            font-family: 'Courier New', Courier, monospace; 
            cursor: pointer; 
            margin-top: 5px;
            font-size: 0.9rem;
        }
        button:hover { 
            background-color: #4af626; 
            color: #000000; 
        }
        
        /* Bloco de Output do Terminal */
        .terminal-output { 
            margin-top: 30px; 
            border-top: 1px dashed #333; 
            padding-top: 20px;
        }
        pre { 
            color: #ffffff; 
            background-color: #000000; 
            white-space: pre-wrap; 
            word-wrap: break-word; 
            font-family: 'Courier New', Courier, monospace; 
            font-size: 0.95rem;
            line-height: 1.5;
        }
