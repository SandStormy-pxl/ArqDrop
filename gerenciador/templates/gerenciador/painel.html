<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termux</title>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: monospace; 
            margin: 20px; 
        }
        form { 
            margin-bottom: 20px; 
        }
        .prompt { 
            color: #0f0; 
            font-weight: bold; 
            margin-right: 5px; 
        }
        input, textarea { 
            background: none; 
            color: #fff; 
            border: none; 
            outline: none; 
            font-family: monospace; 
            font-size: 1rem; 
            width: 80%; 
        }
        textarea { 
            height: 100px; 
            vertical-align: top; 
        }
        button { 
            display: none; 
        }
        pre { 
            color: #fff; 
            font-family: monospace; 
            white-space: pre-wrap; 
            margin-top: 20px; 
            border-top: 1px solid #222; 
            padding-top: 20px; 
        }
    </style>
</head>
<body>

    <form method="POST">
        {% csrf_token %}
        <span class="prompt">~$</span>
        <input type="text" name="comando_bash" placeholder="comando bash" autofocus autocomplete="off">
        <button type="submit"></button>
    </form>

    <form method="POST">
        {% csrf_token %}
        <span class="prompt">&gt;&gt;&gt;</span>
        <textarea name="codigo_python" placeholder="código python"></textarea>
        <button type="submit"></button>
    </form>

    {% if resultado %}
        <pre>{{ resultado }}</pre>
    {% endif %}

    <script>
        let ultimoEnter = 0;

        document.querySelector('textarea').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const agora = new Date().getTime();
                const diferenca = agora - ultimoEnter;
                
                // Se o intervalo entre os dois Enters for menor que 500ms, envia
                if (diferenca < 500) {
                    e.preventDefault();
                    this.form.submit();
                }
                
                ultimoEnter = agora;
            }
        });
    </script>
</body>
</html>
