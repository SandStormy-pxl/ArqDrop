<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Termux Console</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #000000; color: #02ff1b; font-family: 'Fira Code', monospace; padding: 15px; }
        .termux-container { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; height: 92vh; }
        .visualizacao-console { flex: 1; overflow-y: auto; background-color: #000000; border: none; padding: 10px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-break: break-all; }
        .linha-comando { display: flex; align-items: center; background: #000000; border-top: 1px solid #1a1a1a; padding: 10px 5px; }
        .prompt-indicador { color: #02ff1b; font-weight: bold; margin-right: 8px; white-space: nowrap; }
        .prompt-python { color: #00a8ff; }
        input[type="text"] { flex: 1; background: transparent; border: none; color: #ffffff; font-family: inherit; font-size: 14px; outline: none; }
        .texto-erro { color: #ff3838; }
        .texto-sistema { color: #ffff00; }
    </style>
</head>
<body>

    <div class="termux-container">
        <div id="historico-console" class="visualizacao-console">Welcome to Termux v0.118 (Hybrid Node)&#10;* Type 'python' to enter Python interactive mode.&#10;* Type 'exit' or 'exit()' to return to Bash.&#10;&#10;$ Terminal pronto.</div>
        
        <div class="linha-comando">
            <span id="prompt-prefixo" class="prompt-indicador">$</span>
            <input type="text" id="input-comando" autofocus placeholder="Digite o comando e pressione Enter..." onkeydown="verificarTecla(event)">
        </div>
    </div>

    <script>
        let modoAtual = 'bash'; 

        function printNoConsole(texto, classe = '') {
            const historico = document.getElementById('historico-console');
            const span = document.createElement('span');
            span.className = classe;
            span.innerText = '\n' + texto;
            historico.appendChild(span);
            historico.scrollTop = historico.scrollHeight; // Rola para o final automaticamente
        }

        function verificarTecla(event) {
            if (event.key === 'Enter') {
                processarLinhaComando();
            }
        }

        async function processarLinhaComando() {
            const inputField = document.getElementById('input-comando');
            const promptPrefixo = document.getElementById('prompt-prefixo');
            const comando = inputField.value.trim();

            if (!comando) return;

            // Ecoa o comando digitado no histórico estilo Termux
            const prefixoAtual = modoAtual === 'bash' ? '$ ' : '>>> ';
            printNoConsole(prefixoAtual + comando);
            inputField.value = ''; // Limpa a entrada imediatamente

            // 1. Controle de alternância de modo
            if (modoAtual === 'bash' && comando === 'python') {
                modoAtual = 'python';
                promptPrefixo.innerText = '>>>';
                promptPrefixo.className = 'prompt-indicador prompt-python';
                printNoConsole("Python 3.10.x (Interactive Session Mode)", "texto-sistema");
                printNoConsole("Use exit() ou exit para retornar ao Bash.", "texto-sistema");
                return;
            }

            if (modoAtual === 'python' && (comando === 'exit()' || comando === 'exit')) {
                modoAtual = 'bash';
                promptPrefixo.innerText = '$';
                promptPrefixo.className = 'prompt-indicador';
                printNoConsole("Sessão Python encerrada. Voltando para o Bash.", "texto-sistema");
                return;
            }

            // 2. Preparação e envio das requisições
            let urlDestino = '/executar-bash/';
            let corpoRequisicao = { comando: comando };

            if (modoAtual === 'python') {
                urlDestino = '/executar-codigo/';
                
                // Análise de input() em tempo real para o modo Python
                const listaRespostas = [];
                const regexInput = /input\s*\((.*?)\)/;
                
                if (regexInput.test(comando)) {
                    const match = comando.match(regexInput);
                    const promptTexto = match[1] ? match[1].replace(/['"]/g, '') : "Entrada:";
                    const respostaUsuario = prompt(promptTexto);
                    listaRespostas.push(respostaUsuario || "");
                }
                corpoRequisicao = { codigo: comando, respostas: listaRespostas };
            }

            // Execução via API
            try {
                const response = await fetch(urlDestino, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(corpoRequisicao)
                });

                const dados = await response.json();

                if (dados.erro) {
                    printNoConsole(`[Erro]: ${dados.erro}`, "texto-erro");
                } else if (dados.saida) {
                    printNoConsole(dados.saida);
                } else {
                    printNoConsole("Comando executado sem retorno de texto.", "texto-sistema");
                }

            } catch (erroRede) {
                printNoConsole(`Erro de comunicação com o servidor: ${erroRede}`, "texto-erro");
            }
        }
    </script>
</body>
</html>
